# ─────────────────────────────────────────────────────────────
# WORKFLOW 3: Cross-Chain Token Mint
# Triggered when tokens are burned on Base Sepolia (Chain A)
# Kwala mints equivalent tokens on Optimism Sepolia (Chain B)
# ─────────────────────────────────────────────────────────────
Name: cross_chain_token_mint_workflow
Trigger:
  TriggerSourceContract: 0xb0C1CdeC1Be918f9E232Bc7B96186035858CccFD
  TriggerChainID: 84532
  TriggerEventName: TokensBurned(address,uint256,address,uint64,bytes32)
  TriggerEventFilter: NA
  TriggerSourceContractABI:  
  TriggerPrice: NA
  RecurringSourceContract: 0xb0C1CdeC1Be918f9E232Bc7B96186035858CccFD
  RecurringChainID: 84532
  RecurringEventName: TokensBurned(address,uint256,address,uint64,bytes32)
  RecurringEventFilter: NA
  RecurringSourceContractABI:  
  RecurringPrice: NA
  RepeatEvery: event
  ExecuteAfter: event
  ExpiresIn: 1781796603
  Meta: NA
  ActionStatusNotificationPOSTURL: NA
  ActionStatusNotificationAPIKey: NA
Actions:
  - Name: mint_on_optimism_sepolia
    Type: call
    TargetContract: "0xb0C1CdeC1Be918f9E232Bc7B96186035858CccFD"
    TargetFunction: mintCrossChain
    SmartWallet: 0x9061e42f972c8b4ffe1848ef6d151afcdbee209e
    TargetParams:
      - "{{event.recipient}}"      # Who receives the tokens on Base
      - "{{event.amount}}"         # How many tokens to mint
      - "{{event.destinationChainId}}"
      - "{{event.transferId}}"     # Prevents double minting
    ChainID: 11155420
    encodedABI:  

    metadata: "Mint SCT tokens on Base Sepolia after burn on Polygon"
    retriesUntilSuccess: 3         # Higher retries — token minting is critical
Execution:
  Mode: sequential

